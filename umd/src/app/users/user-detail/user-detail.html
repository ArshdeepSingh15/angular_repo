@if (user(); as u) {
  <div class="space-y-3">
    <h3 class="text-xl font-bold text-gray-800 mb-4">
      User Details
    </h3>

    <p><b>Name:</b> {{ u.name | uppercase }}</p>
    <p><b>Name Initials:</b> {{ u.name | userInitials }}</p>
    <p><b>Email:</b> {{ u.email | lowercase }}</p>
    <p><b>Email Type:</b> {{ u.email | emailType }}</p>
    <p><b>Phone:</b> {{ u.phone | slice:0:7 }}</p> 
    <p><b>Company:</b> {{ u.company?.name }}</p>

    <div class="flex gap-3 mb-4">
      <button
        (click)="goToProfile()"
        class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium
               hover:bg-blue-700 transition duration-200"
      >
        Profile
      </button>

      <button
        (click)="goToCompany()"
        class="px-4 py-2 rounded-lg bg-green-600 text-white font-medium
               hover:bg-green-700 transition duration-200"
      >
        Company
      </button>
    </div>

    <hr />

    <div class="p-4 border rounded-lg bg-gray-50">
      <router-outlet></router-outlet>
    </div>
  </div>
}
