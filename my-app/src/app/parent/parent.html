<div class="parent">
<h2>User Management</h2>

<app-child
  [user]="selectedUser"
  (formSubmit)="onFormSubmit($event)">
</app-child>

<hr>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let user of users">
    <td>{{ user.id }}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.role }}</td>
    <td>
      <button (click)="onEdit(user)">Edit</button>
    </td>
  </tr>
</table>
</div>
