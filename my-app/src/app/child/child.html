<h3 *ngIf="!isEditMode()">Add User</h3>
<h3 *ngIf="isEditMode()">Edit User</h3>

<form (ngSubmit)="onSubmit()">

  <div>
    <label>ID:   </label>
    <input
      type="number"
      [(ngModel)]="user.id"
      name="id"
      readonly>
  </div>

  <div>
    <label>Name: </label>
    <input
      type="text"
      [(ngModel)]="user.name"
      name="name"
      required>
  </div>

  <div>
    <label>Email:</label>
    <input
      type="email"
      [(ngModel)]="user.email"
      name="email"
      required>
  </div>

  <div>
    <label>Role: </label>
    <input
      type="text"
      [(ngModel)]="user.role"
      name="role"
      required>
  </div>

  <button type="submit">
    {{ isEditMode() ? 'Update' : 'Add' }}
  </button>

</form>
